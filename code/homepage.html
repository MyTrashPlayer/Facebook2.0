<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GreenBook</title>
    <link rel="stylesheet" href="homepage.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <ul class="nav-right">
            <li>
                <a href="homepage.html" class="nav-item">
                    <span class="icon">🏠</span>
                    <span class="tooltip">Home</span>
                </a>
            </li>
            <li>
                <a href="friends.html" class="nav-item">
                    <span class="icon">👥</span>
                    <span class="tooltip">Friends</span>
                </a>
            </li>
            <li>
                <a href="marketplace.html" class="nav-item">
                    <span class="icon">🏪</span>
                    <span class="tooltip">Marketplace</span>
                </a>
            </li>
            <li>
                <a href="groups.html" class="nav-item">
                    <span class="icon">👨‍👩‍👧‍👦</span>
                    <span class="tooltip">Groups</span>
                </a>
            </li>

        </ul>
    </nav>

    <!-- MAIN LAYOUT -->
    <div class="container">

        <!-- LEFT SIDEBAR -->
        <div class="sidebar">
            <div class="menu-item">News Feed</div>
            <div class="menu-item">Friends</div>
            <div class="menu-item">Messages</div>
            <div class="menu-item">Groups</div>
        </div>

        <!-- FEED -->
        <div class="feed">

            <!-- CREATE POST -->
            <div class="create-post">
                <textarea placeholder="What's on your mind?"></textarea>
                <button>Post</button>
            </div>

            <!-- POSTS -->
            <div class="post">
                <h4>User Name</h4>
                <p>This is a sample post content.</p>
                <div class="post-actions">
                    <button>Like</button>
                    <button>Comment</button>
                </div>
            </div>

            <div class="post">
                <h4>Another User</h4>
                <p>Another example post in your feed.</p>
                <div class="post-actions">
                    <button>Like</button>
                    <button>Comment</button>
                </div>
            </div>

        </div>

        <!-- RIGHT SIDEBAR -->
        <div class="rightbar">
            <div class="right-card">
                <strong>Sponsored</strong>
                <p>Ad content here</p>
            </div>

            <div class="right-card">
                <strong>Contacts</strong>
                <p>Friend 1</p>
                <p>Friend 2</p>
            </div>
        </div>

    </div>



</body>

</html>
