<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">

</head>


<body>
<div class="boxLogin">
    <div id="logo">PhotoBook</div>
    <h1 id="enter_email_text">Login to your account</h1>
    <form id="LoginForm">
        <input name="email" type="email" placeholder="Type your email here..." required>
        <input id="form_password" name="password" type="password" placeholder="Enter your password" required>
        <button type="submit" id="log_in_btn">Log in</button>
    </form>
</div> 
   
   
</body>
